name: lint-validate-deploy-infrastructure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Bicep linter
        run: az bicep build --file ./main.bicep
  validate:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          auth-type: IDENTITY
          client-id: 1f3fa5e9-dbb7-407f-b3d1-06e9d546e2bd
          tenant-id: 00c6d044-082c-4888-ab54-fc91a03303cf
          subscription-id: 01884496-61d8-43f9-af5a-dc218de550e1
      - name: Validate Bicep Template
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: validate
          scope: resourceGroup
          name: main
      - name: What-if Preview
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatif
          scope: resourceGroup
          name: main